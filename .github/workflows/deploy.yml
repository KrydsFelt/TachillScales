name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish "Pulse Blazor/Pulse Blazor.csproj" -c Release -o release --nologo

      - name: Fix base href & add 404.html
        run: |
          sed -i 's|<base href="/" />|<base href="/PulseProject/" />|g' release/wwwroot/index.html
          cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: release/wwwroot
          force_orphan: true